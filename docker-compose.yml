services:
  postgres:
    image: postgres:16-alpine
    container_name: repolens-postgres
    environment:
      POSTGRES_USER: repolens
      POSTGRES_PASSWORD: repolens
      POSTGRES_DB: repolens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repolens"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
